name: Performance Regression Template (Unified)

on:
  workflow_call:
    inputs:
      test_branch:
        description: Branch or commit to run performance test on
        required: true
        type: string
      emulator:
        description: emulator to use
        required: false
        type: string
        default: gsim
      xs_config:
        description: Config for XiangShan core
        required: false
        type: string
        default: DefaultConfig
      benchmark_type:
        required: false
        type: string
        description: Benchmark type
        default: gcc15-spec06-1.0c
      benchmarks:
        description: Specific benchmarks to run (comma-separated), leave empty to run all
        required: false
        type: string
      cst_file:
          description: Constantin file path (empty for default init setting, or file path for specific file)
          required: false
          type: string
      servers:
        description: Servers to run emulation on, leave empty to let the script select
        required: false
        type: string
      checkpoint_path:
        description: Directory for SPEC checkpoints. Ignore this unless benchmark_type is set to custom
        required: false
        type: string
      json_path:
        description: JSON file path for SPEC checkpoints. Ignore this unless benchmark_type is set to custom
        required: false
        type: string
      perf_report_dir:
        description: Directory for all spec reports
        required: true
        type: string
    outputs:
      SHORT_SHA:
        description: Short git commit sha used in this run
        value: ${{ jobs.run.outputs.SHORT_SHA }}
      DATE:
        description: Commit date in yymmdd format used in this run
        value: ${{ jobs.run.outputs.DATE }}
      PERF_DIR:
        description: Base directory for performance reports
        value: ${{ inputs.perf_report_dir }}
      SPEC_DIR:
        description: Output report directory for this performance run
        value: ${{ jobs.run.outputs.SPEC_DIR }}
      CONFIG:
        description: XiangShan config used in this run
        value: ${{ inputs.xs_config }}
      SCORE_FILE:
        description: Path to the score.txt generated in this run
        value: ${{ jobs.run.outputs.SCORE_FILE }}

jobs:
  run:
    runs-on: perf
    continue-on-error: false
    #At most 2 days to finish
    timeout-minutes: 7200
    name: Checkpoints
    outputs:
      SHORT_SHA: ${{ steps.set_env.outputs.SHORT_SHA }}
      DATE: ${{ steps.set_env.outputs.DATE }}
      SPEC_DIR: ${{ steps.set_env.outputs.SPEC_DIR }}
      SCORE_FILE: ${{ steps.set_env.outputs.SCORE_FILE }}
    steps:
      - name: Set test branch or commit
        id: set_test
        run: |
          echo "Using specified branch: ${{ inputs.test_branch }}"
          echo "commit_sha=${{ inputs.test_branch }}" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.set_test.outputs.commit_sha }}
          fetch-depth: 0
          submodules: true

      - name: Set env
        id: set_env
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(git show -s --format=%cd --date=format:%y%m%d HEAD)
          echo "SCRIPTS_HOME=/nfs/home/share/ci-workloads/env-scripts" >> $GITHUB_ENV
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "DATE=${DATE}" >> $GITHUB_OUTPUT

          if [[ -z "${{ inputs.servers }}" ]]; then
            if [[ "${{ inputs.emulator }}" == "gsim" ]]; then
              echo "SERVER_LIST=node" >> $GITHUB_ENV
            else
              echo "SERVER_LIST=open" >> $GITHUB_ENV
            fi
          else
            echo "SERVER_LIST=${{ inputs.servers }}" >> $GITHUB_ENV
          fi

          SPEC_TAG="-${{ inputs.xs_config }}"
          # Set CST_COMPILE_OPT and CST_RUN_OPT based on cst_file
          if [[ -n "${{ inputs.cst_file }}" ]]; then
            if [[ ! -f "${{ inputs.cst_file }}" ]]; then
              echo "Error: cst_file does not exist: ${{ inputs.cst_file }}"
              exit 1
            fi
            CONST_BASENAME=$(basename "${{ inputs.cst_file }}")
            CONST_TAG=${CONST_BASENAME%.*}
            SPEC_TAG="${SPEC_TAG}-${CONST_TAG}"

            echo "CST_COMPILE_OPT=--with-constantin" >> $GITHUB_ENV
            echo "CST_RUN_OPT=--cst-file ${{ inputs.cst_file }}" >> $GITHUB_ENV
          else
            echo "CST_COMPILE_OPT=" >> $GITHUB_ENV
            echo "CST_RUN_OPT=" >> $GITHUB_ENV
          fi
          SPEC_DIR="${{ inputs.perf_report_dir }}/cr${DATE}-${SHORT_SHA}${SPEC_TAG}"

          DRY_RUN_OPT=""

          # set CKPT_HOME
          case "${{ inputs.benchmark_type }}" in
            gcc15-spec06*)
              echo "CKPT_HOME=/nfs/home/share/checkpoints_profiles/spec06_gcc15_rv64gcb_base_260122/checkpoint-0-0-0" >> $GITHUB_ENV
              ;;
            xscc-spec06*)
              echo "CKPT_HOME=/nfs/home/share/checkpoints_profiles/spec06_xscc_v1_rv64gcb_base_260122/checkpoint-0-0-0" >> $GITHUB_ENV
              ;;
            gcc15-rv64gc-spec26*)
              echo "Warning: The current spec26 checkpoint is compiled without b extension, performance may not be ideal" >> $GITHUB_STEP_SUMMARY
              echo "CKPT_HOME=/nfs/home/share/checkpoints_profiles/spec26_gcc15_rv64gc_base_260517/checkpoint" >> $GITHUB_ENV
              ;;
            gcc12-spec06*)
              echo "Warning: gcc12 checkpoints are being deprecated, consider using gcc15-spec06*" >> $GITHUB_STEP_SUMMARY
              echo "CKPT_HOME=/nfs/home/share/checkpoints_profiles/spec06_rv64gcb_O3_20m_gcc12.2.0-intFpcOff-jeMalloc/checkpoint-0-0-0" >> $GITHUB_ENV
              ;;
            custom)
              echo "CKPT_HOME=${{ inputs.checkpoint_path }}" >> $GITHUB_ENV
              ;;
            dryrun)
              echo "CKPT_HOME=/nfs/home/share/checkpoints_profiles/spec06_rv64gcb_O3_20m_gcc12.2.0-intFpcOff-jeMalloc/checkpoint-0-0-0" >> $GITHUB_ENV
              ;;
          esac

          # set CKPT_JSON_PATH
          case "${{ inputs.benchmark_type }}" in
            gcc15-spec06-0.3c)
              echo "CKPT_JSON_PATH=/nfs/home/share/ci-workloads/json/gcc15-spec06-0.3.json" >> $GITHUB_ENV
              ;;
            gcc15-spec06-0.8c)
              echo "CKPT_JSON_PATH=/nfs/home/share/ci-workloads/json/gcc15-spec06-0.8.json" >> $GITHUB_ENV
              ;;
            gcc15-spec06-1.0c)
              echo "CKPT_JSON_PATH=/nfs/home/share/checkpoints_profiles/spec06_gcc15_rv64gcb_base_260122/checkpoint-0-0-0/cluster-0-0.json" >> $GITHUB_ENV
              ;;
            xscc-spec06-0.3c)
              echo "CKPT_JSON_PATH=/nfs/home/share/ci-workloads/json/xscc-spec06-0.3.json" >> $GITHUB_ENV
              ;;
            xscc-spec06-0.8c)
              echo "CKPT_JSON_PATH=/nfs/home/share/ci-workloads/json/xscc-spec06-0.8.json" >> $GITHUB_ENV
              ;;
            xscc-spec06-1.0c)
              echo "CKPT_JSON_PATH=/nfs/home/share/checkpoints_profiles/spec06_xscc_v1_rv64gcb_base_260122/checkpoint-0-0-0/cluster-0-0.json" >> $GITHUB_ENV
              ;;
            gcc15-rv64gc-spec26-0.3c)
              echo "CKPT_JSON_PATH=/nfs/home/share/checkpoints_profiles/spec26_gcc15_rv64gc_base_260517/json/checkpoints_cov0.3.json" >> $GITHUB_ENV
              ;;
            gcc15-rv64gc-spec26-1.0c)
              echo "CKPT_JSON_PATH=/nfs/home/share/checkpoints_profiles/spec26_gcc15_rv64gc_base_260517/json/checkpoints_all.json" >> $GITHUB_ENV
              ;;
            gcc12-spec06-0.3c)
              echo "CKPT_JSON_PATH=/nfs/home/share/ci-workloads/json/gcc12o3-incFpcOff-jeMalloc-0.3.json" >> $GITHUB_ENV
              ;;
            gcc12-spec06-0.8c)
              echo "CKPT_JSON_PATH=/nfs/home/share/ci-workloads/json/gcc12o3-incFpcOff-jeMalloc-0.8.json" >> $GITHUB_ENV
              ;;
            gcc12-spec06-1.0c)
              echo "CKPT_JSON_PATH=/nfs/home/share/checkpoints_profiles/spec06_rv64gcb_O3_20m_gcc12.2.0-intFpcOff-jeMalloc/checkpoint-0-0-0/cluster-0-0.json" >> $GITHUB_ENV
              ;;
            custom)
              echo "CKPT_JSON_PATH=${{ inputs.json_path }}" >> $GITHUB_ENV
              ;;
            dryrun)
              echo "CKPT_JSON_PATH=/nfs/home/share/ci-workloads/json/dryrun.json" >> $GITHUB_ENV

              echo "dryrun testing:"
              echo "    default SPEC_DIR: ${SPEC_DIR}"
              SPEC_DIR="${{ inputs.perf_report_dir }}/dryrun${SPEC_TAG}"
              echo "    dryrun SPEC_DIR: ${SPEC_DIR}"
              DRY_RUN_OPT="--dry-run"
              ;;
            *)
              echo "Error: Invalid benchmark_type: ${{ inputs.benchmark_type }}"
              exit 1
              ;;
          esac

          echo "SPEC_DIR=${SPEC_DIR}" >> $GITHUB_ENV
          echo "SPEC_DIR=${SPEC_DIR}" >> $GITHUB_OUTPUT

          # append benchmark_type to score.txt filename, to prevent race condition in "python3 main.py --report"
          SCORE_FILE="${SPEC_DIR}/score-${{ inputs.benchmark_type }}.txt"
          echo "SCORE_FILE=${SCORE_FILE}" >> $GITHUB_ENV
          echo "SCORE_FILE=${SCORE_FILE}" >> $GITHUB_OUTPUT

          echo "DRY_RUN_OPT=${DRY_RUN_OPT}" >> $GITHUB_ENV

      - name: Initialize submodules
        run: make init-force

      - name: Clean Up
        run: |
          python3 $GITHUB_WORKSPACE/scripts/xiangshan.py --clean

      - name: Build EMU with DRAMsim3
        run: |
          if [ ! -e "$SPEC_DIR/emu-${{ inputs.emulator }}" ]; then
            python3 $GITHUB_WORKSPACE/scripts/xiangshan.py --build \
              --config "${{ inputs.xs_config }}" \
              --dramsim3 /nfs/home/share/ci-workloads/DRAMsim3 --with-dramsim3 \
              --threads $([ "${{ inputs.emulator }}" = "gsim" ] && echo 1 || echo 8) \
              --pgo $GITHUB_WORKSPACE/ready-to-run/coremark-2-iteration.bin \
              --llvm-profdata llvm-profdata --trace-fst \
              --emulator ${{ inputs.emulator }} \
              $CST_COMPILE_OPT
            mkdir -p $SPEC_DIR
            cp $GITHUB_WORKSPACE/build/emu "$SPEC_DIR/emu-${{ inputs.emulator }}"
          fi
          if [ ! -e "$SPEC_DIR/riscv64-nemu-interpreter-so" ]; then
            cp $GITHUB_WORKSPACE/ready-to-run/riscv64-nemu-interpreter-so $SPEC_DIR/riscv64-nemu-interpreter-so
          fi

      - name: Run SPEC CPU checkpoints
        run: |
          cd $SCRIPTS_HOME/perf_trigger
          python3 main.py --gcpt-path $CKPT_HOME --json-path $CKPT_JSON_PATH \
            --emu-path "$SPEC_DIR/emu-${{ inputs.emulator }}" --result-path $SPEC_DIR \
            --threads $([ "${{ inputs.emulator }}" = "gsim" ] && echo 1 || echo 8) \
            --benchmarks "${{ inputs.benchmarks }}" \
            --server-list "$SERVER_LIST" \
            --nemu-so-path $SPEC_DIR/riscv64-nemu-interpreter-so \
            --log-level ${{ runner.debug && 'DEBUG' || 'INFO' }} \
            --run \
            $CST_RUN_OPT $DRY_RUN_OPT

      - name: Report SPEC CPU score
        if: always()
        run: |
          cd $SCRIPTS_HOME/perf_trigger
          python3 main.py \
            --gcpt-path $CKPT_HOME \
            --json-path $CKPT_JSON_PATH \
            --result-path $SPEC_DIR \
            --benchmarks "${{ inputs.benchmarks }}" \
            --report \
            > "$SCORE_FILE"

      - name: Summary result
        if: always()
        run: |
          echo "### :rocket: Performance Test Result" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$SCORE_FILE" >> $GITHUB_STEP_SUMMARY
          cat "$SCORE_FILE" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "### :rainbow: Key Indicators" >> $GITHUB_STEP_SUMMARY
          echo "Estimated SPEC CPU Score per GHz: " >> $GITHUB_STEP_SUMMARY
          TOTAL_SCORE=$(grep "SPEC[0-9]\+/GHz:" "$SCORE_FILE" | awk '{print $NF}')
          INT_SCORE=$(grep "SPECint\(rate\)\?[0-9]\+/GHz" "$SCORE_FILE" | awk '{print $(NF-1)}')
          FP_SCORE=$(grep "SPECfp\(rate\)\?[0-9]\+/GHz" "$SCORE_FILE" | awk '{print $(NF-1)}')
          echo "- int: **${INT_SCORE}**" >> $GITHUB_STEP_SUMMARY
          echo "- fp: **${FP_SCORE}**" >> $GITHUB_STEP_SUMMARY
          echo "- total: **${TOTAL_SCORE}**" >> $GITHUB_STEP_SUMMARY
