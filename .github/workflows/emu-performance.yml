# This workflow is for quick performance test, splitted from EMU Test workflow for parallelization
# For more comprehensive performance regression, use Performance Regression Trigger
name: EMU Performance Test

on:
  push:
    branches: [ kunminghu-v3 ]
  pull_request:
    branches: [ kunminghu-v3 ]

env:
  # Set common environment variables for all jobs
  NEMU_HOME: /nfs/home/share/ci-workloads/NEMU
  AM_HOME: /nfs/home/share/ci-workloads/nexus-am
  PERF_HOME: /nfs/home/ci-runner/emu-performance/${{ github.run_number }}
  CKPT_HOME: /nfs/home/share/checkpoints_profiles/spec06_gcc15_rv64gcb_base_260122/checkpoint-0-0-0

jobs:
  changes:
    name: Changes Detection
    permissions:
      pull-requests: read
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          predicate-quantifier: 'every'
          filters: .github/filters.yaml

  build:
    name: EMU - Performance - Build
    needs: changes
    if: ${{ needs.changes.outputs.core == 'true' }}
    runs-on:
      - node # Run on node servers for the moment, as gsim is having performance issue on open servers
      - builder
    outputs:
      cluster: ${{ steps.save.outputs.cluster }}
    timeout-minutes: 180
    continue-on-error: false
    steps:
      - name: Cleanup orphan EMU
        run: |
          pkill -9 -e -f ${GITHUB_WORKSPACE}/build/emu || true
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: true
      - name: Init
        run: |
          mkdir -p ${PERF_HOME}
          make init-force
          python3 ${GITHUB_WORKSPACE}/scripts/xiangshan.py --clean
      - name: Build EMU
        run: |
          python3 ${GITHUB_WORKSPACE}/scripts/xiangshan.py --build \
            --emulator gsim \
            --yaml-config ${GITHUB_WORKSPACE}/src/main/resources/config/Default.yml \
            --with-dramsim3 --dramsim3 /nfs/home/share/ci-workloads/DRAMsim3 \
            --pgo ${GITHUB_WORKSPACE}/ready-to-run/coremark-2-iteration.bin --llvm-profdata llvm-profdata \
            --trace-fst
      - name: Save artifact
        id: save
        # Maybe we can use upload-artifact here
        # but ~100MB is too large and we don't have good enough internet on self-hosted runner
        # so we just copy the binary to a shared directory
        run: |
          cp -L ${GITHUB_WORKSPACE}/build/emu ${PERF_HOME}/emu
          if [[ $(hostname) == *.bosccluster.com ]]; then
            echo "cluster=node" >> ${GITHUB_OUTPUT}
          else
            echo "cluster=open" >> ${GITHUB_OUTPUT}
          fi

  run-legacy: # TODO: drop this after most of the dev branches are migrated to the new workflow
    name: EMU - Performance - Run (legacy)
    needs: build
    runs-on:
      - ${{ needs.build.outputs.cluster }} # use same cluster as builder to avoid cross-cluster network copy & pgo issue
      - runner
    timeout-minutes: 300
    continue-on-error: false
    strategy:
      matrix:
        name:
          # Vector-related workloads are temporarily disabled in CI due to the ongoing vector refactor.
          # - hmmer-Vector
          - mcf
          - xalancbmk
          - gcc
          - namd
          - milc
          - lbm
          - gromacs
          - wrf
          - astar
        with-restore-bin: [true]
        # exclude:
        #   - name: hmmer-Vector
        # include:
        #   - name: hmmer-Vector
        #     with-restore-bin: false
      fail-fast: false
      max-parallel: 4
    steps:
      - name: Cleanup orphan EMU
        run: |
          pkill -9 -e -f ${GITHUB_WORKSPACE}/build/emu || true
      - uses: actions/checkout@v7
        with:
          submodules: true
      - name: Get artifact
        run: |
          python3 ${GITHUB_WORKSPACE}/scripts/xiangshan.py --clean
          mkdir -p build
          echo "Getting EMU binary from ${PERF_HOME}/emu"
          cp -L ${PERF_HOME}/emu ${GITHUB_WORKSPACE}/build/emu
      - name: Run Legacy CI Test - ${{ matrix.name }}
        id: run
        shell: bash
        run: |
          # TODO: remove --disable-fork to enable lightSSS when gsim supports it
          python3 ${GITHUB_WORKSPACE}/scripts/xiangshan.py \
            --wave-dump ${PERF_HOME} \
            --numa --threads 1 \
            --max-instr 5000000 \
            --disable-fork \
            --ci ${{ matrix.name }} \
            ${{ matrix.with-restore-bin && '--gcpt-restore-bin /nfs/home/share/ci-workloads/fix-gcpt/gcpt.bin' || '' }} \
            2> stderr.log | tee stdout.log
          grep -oP 'IPC = \K\d+\.\d+' stdout.log > "${PERF_HOME}/ipc-legacy-${{ matrix.name }}"
          echo "IPC: $(cat "${PERF_HOME}/ipc-legacy-${{ matrix.name }}")"
      - name: Archive log
        if: ${{ always() && steps.run.outcome != 'skipped' }}
        run: |
          # if run step failed, do not sort
          if [[ "${{ steps.run.outcome }}" == "failure" ]]; then
            cat stderr.log
          else
            mv stderr.log stderr.log.raw
            cat stderr.log.raw | sort | tee stderr.log
          fi
          tar -czvf "${PERF_HOME}/legacy_${{ matrix.name }}.tar.gz" stdout.log stderr.log

  run:
    name: EMU - Performance - Run
    needs: build
    runs-on:
      - ${{ needs.build.outputs.cluster }} # use same cluster as builder to avoid cross-cluster network copy & pgo issue
      - runner
    timeout-minutes: 300
    continue-on-error: false
    strategy:
      matrix:
        include:
          - name: perlbench_splitmail
            ckpt: 3995
          - name: bzip2_liberty
            ckpt: 739
          - name: gcc_s04
            ckpt: 2772
          - name: mcf
            ckpt: 6388
          - name: gobmk_nngs
            ckpt: 453
          - name: hmmer_nph3
            ckpt: 33214
          - name: sjeng
            ckpt: 64284
          - name: libquantum
            ckpt: 81539
          - name: h264ref_foreman.main
            ckpt: 10053
          - name: omnetpp
            ckpt: 14042
          - name: astar_rivers
            ckpt: 8728
          - name: xalancbmk
            ckpt: 9874
          - name: bwaves
            ckpt: 30350
          - name: gamess_gradient
            ckpt: 36450
          - name: milc
            ckpt: 7124
          - name: zeusmp
            ckpt: 45598
          - name: gromacs
            ckpt: 2907
          - name: cactusADM
            ckpt: 61235
          - name: leslie3d
            ckpt: 37552
          - name: namd
            ckpt: 75757
          - name: dealII
            ckpt: 13061
          - name: soplex_ref
            ckpt: 10774
          - name: povray
            ckpt: 8362
          - name: calculix
            ckpt: 53456
          - name: GemsFDTD
            ckpt: 49458
          - name: tonto
            ckpt: 69015
          - name: lbm
            ckpt: 31064
          - name: wrf
            ckpt: 112496
          - name: sphinx3
            ckpt: 141036
      fail-fast: false
      max-parallel: 12 # TODO: increase this to 16 after dropping legacy workflow
    steps:
      - name: Cleanup orphan EMU
        run: |
          pkill -9 -e -f ${GITHUB_WORKSPACE}/build/emu || true
      - uses: actions/checkout@v7
        with:
          submodules: true
      - name: Get artifact
        run: |
          python3 ${GITHUB_WORKSPACE}/scripts/xiangshan.py --clean
          mkdir -p build
          echo "Getting EMU binary from ${PERF_HOME}/emu"
          cp -L ${PERF_HOME}/emu ${GITHUB_WORKSPACE}/build/emu
      - name: Run SPEC06 Test - ${{ matrix.name }}
        id: run
        shell: bash
        run: |
          export CKPT=$(find "${CKPT_HOME}/${{ matrix.name }}/${{ matrix.ckpt }}" -type f \( -name "*.gz" -o -name "*.zstd" \) | head -n 1)
          echo "Running checkpoint: ${CKPT}"
          # TODO: remove --disable-fork to enable lightSSS when gsim supports it
          python3 ${GITHUB_WORKSPACE}/scripts/xiangshan.py \
            --wave-dump ${PERF_HOME} \
            --numa --threads 1 \
            --max-instr 5000000 \
            --disable-fork \
            ${CKPT} \
            2> stderr.log | tee stdout.log
          grep -oP 'IPC = \K\d+\.\d+' stdout.log > "${PERF_HOME}/ipc-${{ matrix.name }}_${{ matrix.ckpt }}"
          echo "IPC: $(cat "${PERF_HOME}/ipc-${{ matrix.name }}_${{ matrix.ckpt }}")"
      - name: Archive log
        if: ${{ always() && steps.run.outcome != 'skipped' }}
        run: |
          # if run step failed, do not sort
          if [[ "${{ steps.run.outcome }}" == "failure" ]]; then
            cat stderr.log
          else
            mv stderr.log stderr.log.raw
            cat stderr.log.raw | sort | tee stderr.log
          fi
          tar -czvf "${PERF_HOME}/${{ matrix.name }}_${{ matrix.ckpt }}.tar.gz" stdout.log stderr.log

  upload:
    name: EMU - Performance - Upload
    needs:
      - build # needed to get the cluster info
      - run
      - run-legacy # TODO: drop this
    runs-on:
      - ${{ needs.build.outputs.cluster }} # use same cluster as builder/runner to access NFS
      - runner
    steps:
      - name: Upload report
        uses: actions/upload-artifact@v7
        with:
          name: ipc-reports
          path: ${{ env.PERF_HOME }}/ipc-*

  dispatch-summary:
    name: EMU - Performance - Dispatch Summary
    permissions:
      actions: write
    needs: upload
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch emu-performance-summary workflow
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
          COMMENT_ID: ""
        run: |
          dispatch_ts=$(date -u +%s)
          gh api repos/${GITHUB_REPOSITORY}/actions/workflows/emu-performance-summary.yml/dispatches \
            -f ref="${DISPATCH_REF}" \
            -f inputs[HEAD_SHA]="${HEAD_SHA}" \
            -f inputs[BASE_SHA]="${BASE_SHA}" \
            -f inputs[PR]="${PR}" \
            -f inputs[COMMENT_ID]="${COMMENT_ID}"

          summary_url=""
          for _ in {1..20}; do
            summary_url=$(gh run list \
              --repo "${GITHUB_REPOSITORY}" \
              --workflow "EMU Performance Summary" \
              --event workflow_dispatch \
              --branch "${DISPATCH_REF}" \
              --limit 20 \
              --json url,createdAt \
              | jq -r --argjson ts "${dispatch_ts}" '[.[] | select((.createdAt | fromdateiso8601) >= $ts)] | first | .url // empty')
            if [ -n "${summary_url}" ]; then
              break
            fi
            sleep 3
          done

          if [ -n "${summary_url}" ]; then
            echo "Summary workflow dispatched: ${summary_url}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Summary workflow dispatched, but run URL not found yet. Please check workflow list manually." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Skip dispatch for fork PR
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        run: |
          echo "Fork PR detected, skip summary workflow dispatch because GITHUB_TOKEN cannot dispatch workflows in pull_request from fork." >> $GITHUB_STEP_SUMMARY
